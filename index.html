<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doruk TV Yayın Kanalı</title>
    <style>
        :root {
            --primary-color: #d32f2f; /* Doruk TV Kırmızısı */
            --secondary-color: #00838f; /* Turkuaz tonu */
            --bg-color: #f4f4f9;
            --text-color: #333;
            --ai-color: #6a1b9a; /* Yapay Zeka için özel mor */
            --canva-color: #00C4CC; /* Canva turkuazı */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Header Section */
        .header-container {
            text-align: center;
            padding: clamp(40px, 6vw, 100px) 20px;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center; /* Başlığı ve linkleri ortalar */
        }

        h1 {
            margin: 0;
            margin-bottom: clamp(25px, 4.5vw, 45px); /* Başlık altındaki boşluk */
            font-size: clamp(2.2rem, 5.5vw, 4.5rem);
            color: var(--primary-color);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Sosyal Medya Butonları Konteyneri - Tam Ortalamak İçin */
        .social-links {
            display: flex;
            flex-direction: column; /* Linkleri alt alta dizer */
            align-items: center; /* Linkleri yatayda tam ortalar */
            gap: 15px; /* Linkler arasındaki boşluk */
            width: 100%;
            max-width: 400px; /* Butonların maksimum genişliği */
            padding: 0 20px;
            box-sizing: border-box;
        }

        .social-links a {
            text-decoration: none;
            color: white;
            padding: 15px 25px;
            border-radius: 35px;
            font-weight: bold;
            font-size: clamp(1rem, 1.8vw, 1.3rem);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%; /* Konteynerin tüm genişliğini kaplar */
            box-sizing: border-box;
            text-align: center;
        }

        .social-links a:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }

        /* Özel Renk Tanımlamaları */
        .btn-youtube { background-color: #FF0000; }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-capcut { background-color: #000000; }
        .btn-ingattar { background-color: var(--canva-color); color: #fff; } /* Canva Sitesi */
        .btn-ai { background-color: var(--ai-color); } /* Yapay Zeka */

        /* Floating Chat Button */
        .chat-toggle-btn {
            position: fixed;
            bottom: clamp(20px, 4vw, 50px);
            right: clamp(20px, 4vw, 50px);
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: clamp(60px, 6vw, 80px);
            height: clamp(60px, 6vw, 80px);
            font-size: clamp(24px, 2.5vw, 32px);
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }

        .chat-toggle-btn:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Chat Widget */
        .chat-widget {
            position: fixed;
            bottom: clamp(90px, 11vw, 140px);
            right: clamp(20px, 4vw, 50px);
            width: 350px;
            max-width: calc(100vw - 40px);
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            overflow: hidden;
            display: none;
            flex-direction: column;
            z-index: 1000;
        }

        .chat-header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: clamp(1.1rem, 1.8vw, 1.4rem);
        }

        .chat-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        input[type="email"], textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn-submit {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .hidden { display: none !important; }

        .success-msg {
            text-align: center;
            color: #2e7d32;
            font-weight: bold;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <header class="header-container">
        <h1>Doruk TV Yayın Kanalı</h1>
        
        <div class="social-links">
            <a href="https://youtube.com/@doruktvyayinkanali?si=6ID-311UGoVKEu_z" target="_blank" class="btn-youtube">YouTube</a>
            <a href="https://www.instagram.com/doruk_tvyayinkanali?igsh=b2VrYzR1NzluODJh&utm_source=qr" target="_blank" class="btn-instagram">Instagram</a>
            <a href="https://mobile.capcutshare.com/sv2/ZSHdqaLUW/" target="_blank" class="btn-capcut">CapCut</a>
            
            <a href="https://canvasitesi.my.canva.site/ingattar" target="_blank" class="btn-ingattar">İngattar (Canva)</a>
            <a href="https://www.icloud.com/shortcuts/f869f025757a413fbdc65e236e00d60c" target="_blank" class="btn-ai">🤖 Yapay Zeka Kestirmesi</a>
        </div>
    </header>

    <button class="chat-toggle-btn" id="chatToggleBtn">💬</button>

    <div class="chat-widget" id="chatWidget">
        <div class="chat-header">Bize Ulaşın</div>
        <div class="chat-body">
            <div id="step-email">
                <input type="email" id="userEmail" placeholder="E-posta adresinizi giriniz..." required>
                <button class="btn-submit" id="btnNext" style="margin-top: 12px; width: 100%;">Devam Et</button>
            </div>

            <div id="step-message" class="hidden">
                <textarea id="userMessage" placeholder="Mesajınızı buraya yazın..." required></textarea>
                <button class="btn-submit" id="btnSend" style="margin-top: 12px; width: 100%;">Gönder</button>
            </div>

            <div id="step-success" class="hidden success-msg">
                Mesajınız gönderildi, müsait olduğumuz zaman sizin e-postanıza yanıtımızı göndereceğiz.
            </div>
        </div>
    </div>

    <script>
        const chatToggleBtn = document.getElementById('chatToggleBtn');
        const chatWidget = document.getElementById('chatWidget');
        const btnNext = document.getElementById('btnNext');
        const btnSend = document.getElementById('btnSend');
        
        const stepEmail = document.getElementById('step-email');
        const stepMessage = document.getElementById('step-message');
        const stepSuccess = document.getElementById('step-success');
        
        const emailInput = document.getElementById('userEmail');
        const messageInput = document.getElementById('userMessage');

        let userEmailValue = '';

        chatToggleBtn.addEventListener('click', () => {
            if (chatWidget.style.display === 'flex') {
                chatWidget.style.display = 'none';
                chatToggleBtn.innerText = '💬';
            } else {
                chatWidget.style.display = 'flex';
                chatToggleBtn.innerText = '✕';
            }
        });

        btnNext.addEventListener('click', () => {
            if (emailInput.value.includes('@') && emailInput.value.includes('.')) {
                userEmailValue = emailInput.value;
                stepEmail.classList.add('hidden');
                stepMessage.classList.remove('hidden');
            } else {
                alert('Lütfen geçerli bir e-posta adresi giriniz.');
            }
        });

        btnSend.addEventListener('click', () => {
            const messageValue = messageInput.value.trim();
            if (messageValue === '') { alert('Lütfen bir mesaj yazınız.'); return; }

            btnSend.innerText = "Gönderiliyor...";
            btnSend.disabled = true;

            fetch('https://formspree.io/f/mzdkerqo', {
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ "E-posta": userEmailValue, "Mesaj": messageValue })
            }).then(response => {
                if (response.ok) {
                    stepMessage.classList.add('hidden');
                    stepSuccess.classList.remove('hidden');
                    setTimeout(() => {
                        chatWidget.style.display = 'none';
                        chatToggleBtn.innerText = '💬';
                        // Formu sıfırla
                        setTimeout(() => {
                            stepSuccess.classList.add('hidden');
                            stepEmail.classList.remove('hidden');
                            emailInput.value = '';
                            messageInput.value = '';
                            btnSend.innerText = "Gönder";
                            btnSend.disabled = false;
                        }, 500);
                    }, 4000);
                }
            });
        });
    </script>
</body>
</html>
