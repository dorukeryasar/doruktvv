<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doruk TV Yayın Kanalı</title>
    <style>
        :root {
            --primary-color: #d32f2f; 
            --secondary-color: #00838f; 
            --bg-color: #f4f4f9;
            --text-color: #333;
            --ai-color: #6a1b9a;
            --ingattar-color: #00C4CC;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header-container {
            text-align: center;
            padding: clamp(40px, 6vw, 100px) 20px;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 0;
            margin-bottom: clamp(30px, 5vw, 50px);
            font-size: clamp(2.2rem, 5.5vw, 4.5rem);
            color: var(--primary-color);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .social-links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .social-links a {
            text-decoration: none;
            color: white;
            padding: 18px 25px;
            border-radius: 40px;
            font-weight: bold;
            font-size: clamp(1rem, 1.8vw, 1.3rem);
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        .social-links a:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }

        .btn-youtube { background-color: #FF0000; }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-capcut { background-color: #000000; }
        .btn-ingattar { background-color: var(--ingattar-color); }
        .btn-ai { background-color: var(--ai-color); }

        .chat-toggle-btn {
            position: fixed;
            bottom: clamp(20px, 4vw, 50px);
            right: clamp(20px, 4vw, 50px);
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: clamp(60px, 6vw, 80px);
            height: clamp(60px, 6vw, 80px);
            font-size: clamp(24px, 2.5vw, 32px);
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            z-index: 1001;
        }

        .chat-widget {
            position: fixed;
            bottom: clamp(90px, 11vw, 140px);
            right: clamp(20px, 4vw, 50px);
            width: 350px;
            max-width: calc(100vw - 40px);
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            display: none;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
        }

        .chat-header { background-color: var(--primary-color); color: white; padding: 20px; text-align: center; font-weight: bold; }
        .chat-body { padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { background-color: var(--secondary-color); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        .success-msg { text-align: center; color: #2e7d32; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

    <header class="header-container">
        <h1>Doruk TV Yayın Kanalı</h1>
        
        <div class="social-links">
            <a href="https://youtube.com/@doruktvyayinkanali?si=6ID-311UGoVKEu_z" target="_blank" class="btn-youtube">YouTube</a>
            <a href="https://www.instagram.com/doruk_tvyayinkanali?igsh=b2VrYzR1NzluODJh&utm_source=qr" target="_blank" class="btn-instagram">Instagram</a>
            <a href="https://mobile.capcutshare.com/sv2/ZSHdqaLUW/" target="_blank" class="btn-capcut">CapCut</a>
            <a href="https://canvasitesi.my.canva.site/ingattar" target="_blank" class="btn-ingattar">İngattar</a>
            <a href="https://www.icloud.com/shortcuts/f869f025757a413fbdc65e236e00d60c" target="_blank" class="btn-ai">🤖 Yapay Zeka Kestirmesi</a>
        </div>
    </header>

    <button class="chat-toggle-btn" id="chatToggleBtn">💬</button>

    <div class="chat-widget" id="chatWidget">
        <div class="chat-header">Bize Ulaşın</div>
        <div class="chat-body">
            <div id="step-email">
                <input type="email" id="userEmail" placeholder="E-posta adresiniz..." required>
                <button class="btn-submit" id="btnNext" style="margin-top: 10px; width: 100%;">Devam Et</button>
            </div>
            <div id="step-message" class="hidden">
                <textarea id="userMessage" placeholder="Mesajınız..." required></textarea>
                <button class="btn-submit" id="btnSend" style="margin-top: 10px; width: 100%;">Gönder</button>
            </div>
            <div id="step-success" class="hidden success-msg">
                Mesajınız gönderildi, yakında dönüş yapacağız.
            </div>
        </div>
    </div>

    <script>
        const chatToggleBtn = document.getElementById('chatToggleBtn');
        const chatWidget = document.getElementById('chatWidget');
        const btnNext = document.getElementById('btnNext');
        const btnSend = document.getElementById('btnSend');
        const emailInput = document.getElementById('userEmail');
        const messageInput = document.getElementById('userMessage');

        chatToggleBtn.addEventListener('click', () => {
            chatWidget.style.display = chatWidget.style.display === 'flex' ? 'none' : 'flex';
        });

        btnNext.addEventListener('click', () => {
            if(emailInput.value.includes('@')) {
                document.getElementById('step-email').classList.add('hidden');
                document.getElementById('step-message').classList.remove('hidden');
            }
        });

        btnSend.addEventListener('click', () => {
            btnSend.innerText = "Gönderiliyor...";
            fetch('https://formspree.io/f/mzdkerqo', {
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailInput.value, message: messageInput.value })
            }).then(() => {
                document.getElementById('step-message').classList.add('hidden');
                document.getElementById('step-success').classList.remove('hidden');
                setTimeout(() => { chatWidget.style.display = 'none'; }, 3000);
            });
        });
    </script>
</body>
</html>
